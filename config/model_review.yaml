# model_review.yaml
# OpenAI 兼容图表复评配置（相对路径基于项目根目录）

# 候选列表 JSON
candidates: data/candidates/candidates_latest.json

# 候选图表目录（其下按 pick_date 分目录）
kline_dir: data/kline

# 评分结果输出目录
output_dir: data/review

# 提示词文件
prompt_path: agent/prompt.md

# OpenAI 兼容模型名称
model: gpt-4o-mini

# OpenAI 兼容 API Base URL（留空使用官方）
base_url: ""

# API 风格：responses | chat_completions
api_style: responses

# 相邻 API 调用间隔（秒）
request_delay: 5

# true: 跳过已存在单股 JSON（断点续跑）
skip_existing: false

# 推荐最小分数门槛
suggest_min_score: 4.0
