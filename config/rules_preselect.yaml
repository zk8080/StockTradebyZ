# rules_preselect.yaml
# 量化初选规则配置文件
# pipeline/select_stock.py 读取本文件中的参数

# ── 全局设置 ─────────────────────────────────────────────────────────
global:
  data_dir: "./data/raw"          # A股日线CSV目录
  output_dir: "./data/candidates" # 候选结果输出目录
  top_m: 5000                     # 流动性池：取成交额最高的 top_m 只
  n_turnover_days: 43             # 滚动成交额窗口（日）
  min_bars_buffer: 10             # 额外的最小 bar 缓冲

# ── B1 策略参数（KDJ + 知行均线多头排列） ────────────────────────────
b1:
  enabled: true
  zx_m1: 14
  zx_m2: 28
  zx_m3: 57
  zx_m4: 114
  j_threshold: 15.0
  j_q_threshold: 0.10

# ── B2 策略参数（B1超跌位启动确认） ──────────────────────────────────
b2:
  enabled: true
  b1_lookback_days: 3
  min_return: 0.04
  require_volume_up_vs_prev: true
  j_max: 55
  j_turn_mode: combo
  j_jump_min: 8
  max_upper_shadow_ratio: 0.03
  prefer_short_upper_shadow: true

  score:
    version: v1
    weights:
      return: 30
      j_position: 20
      j_delta: 20
      volume_ratio: 20
      upper_shadow: 10
    return_floor: 0.04
    return_ceiling: 0.10
    j_ceiling: 55
    j_delta_ceiling: 40
    volume_ratio_floor: 1.0
    volume_ratio_ceiling: 3.0
    upper_shadow_ceiling: 0.03

# ── B2 + Brick 组合策略（共振确认） ───────────────────────────────────
b2_brick:
  enabled: true
  score:
    version: v1
    weights:
      b2: 0.6
      brick: 0.4
    resonance_bonus: 5
    max_score: 100

# ── 砖型反转 XG（按用户新公式实现）──────────────────────────────────
brick_reversal_xg:
  enabled: true
  zx_m1: 14
  zx_m2: 28
  zx_m3: 57
  zx_m4: 114
  n: 4
  m1: 4
  m2: 6
  m3: 6
  t: 4
  shift1: 90
  shift2: 100
  sma_w1: 1
  sma_w2: 1
  sma_w3: 1
  height_ratio: 0.6666667
  score:
    version: v1
    weights:
      red_height: 35
      recovery_ratio: 30
      yellow_margin: 20
      brick_level: 15
    red_height_ceiling: 20
    recovery_ratio_floor: 0.6666667
    recovery_ratio_ceiling: 3.0
    yellow_margin_floor: 0.0
    yellow_margin_ceiling: 0.15
    brick_level_ceiling: 20

# ── 砖型图（BrickChart）策略参数 ──────────────────────────────────────
brick:
  enabled: true

  score:
    version: v1
    base_score: 60
    max_score: 100

  # 砖型图计算参数
  n: 8
  m1: 3
  m2: 12
  m3: 12
  t: 8
  shift1: 92
  shift2: 114
  sma_w1: 1
  sma_w2: 1
  sma_w3: 1

  # 选股过滤阈值
  daily_return_threshold: 0.2    # 今日涨幅上限
  brick_growth_ratio: 1.0         # 今日红柱 >= N × 昨日绿柱绝对值
  min_prior_green_bars: 1         # 红柱前至少有几根连续绿柱

  # 知行线参数
  zxdq_ratio: 1.47                 # 收盘价 < zxdq × ratio；null = 不启用
  zxdq_span: 10
  require_zxdq_gt_zxdkx: true
  zxdkx_m1: 14
  zxdkx_m2: 28
  zxdkx_m3: 57
  zxdkx_m4: 114

  # 周线均线多头排列
  require_weekly_ma_bull: true
  wma_short: 5
  wma_mid: 10
  wma_long: 20
